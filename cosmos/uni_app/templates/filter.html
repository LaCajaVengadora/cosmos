<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search by...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>                              <!-- GETS FROM ctx: unis, cats, carreras & filter -->

    <header>
        <div class="px-3 py-2 text-bg-dark border-bottom">
          <div class="container">
            <div class="d-flex nav flex-wrap align-items-center justify-content-between">
              <div>
                  <a href="#" class="nav-link text-secondary">
                    <h1 style="color: white;">COSMOS</h1> 
                  </a>
                </div>
              <div class=" d-flex align-items-end">
                <form role="search" method="GET" action="{% url 'main:home' %}">
                    <button type="submit">BUSCAR</button>
                    <input type="search" name="q" placeholder="Buscar...">
                </form>
            </div>
            </div>
          </div>
        </div>
    </header>
    <div class="p-3">
    <h1>RESULTADOS PARA {{filter}}</h1>                                <!-- SHOWS filter -->

    <form role="search" method="GET" action="{% url 'main:home' %}">
        <button type="submit">SEARCH</button>                       <!-- SEARCHES BY q ON home -->
        <input type="search" name="q" placeholder="Buscar...">
    </form>

    <h4><a href="{% url 'main:home' %}">LIMPIAR FILTROS</a></h4>      <!-- GOES TO home -->

    <h3>FILTRAR POR:</h3>
    <p>CATS: {% for i in cats %} <a href="{% url 'main:filter' 'cat' i.id %}">{{i.name}}</a>{% endfor %}</p>
    <p>UNIS: {% for i in unis %} <a href="{% url 'main:filter' 'uni' i.id %}">{{i.name}}</a>{% endfor %}</p>
    <!-- SHOWS ALL unis & cats AVAILABLE; IF CLICK, GOES TO filter URL WITH TYPE OF FILTER & ID -->

    <h2>CARRERAS:</h2>                                              <!--SHOWS ALL carreras FILTERED-->
    <ul>{% for i in carreras %}<li>{{i}}</li>{% endfor %}</ul>
</div>
</body>
</html>
